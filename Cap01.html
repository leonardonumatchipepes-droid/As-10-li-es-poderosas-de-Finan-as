<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Capítulo 01</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
  padding:20px;
}

h1 {
  color:#e50914;
}

.btn {
  padding:12px 18px;
  background:#e50914;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin-top:20px;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
}
</style>
</head>

<body>

<h1>CAPÍTULO 01</h1>
<h2>Mentalidade Financeira</h2>

<p>
O dinheiro não começa na carteira, começa na mente.
Quem muda a mentalidade muda o destino financeiro.
</p>

<button class="btn" onclick="finish()">
Concluir capítulo
</button>

<script>
// carregar sistema global
function getProgress() {
  return parseInt(localStorage.getItem("finance_progress") || "1");
}

function unlockNext(level) {
  let current = getProgress();
  if (level >= current) {
    localStorage.setItem("finance_progress", level + 1);
  }
}

function finish() {
  playSound();
  unlockNext(1);
  window.location.href = "indice.html";
}

// som simples
function playSound() {
  let audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}
</script>

</body>
</html>
