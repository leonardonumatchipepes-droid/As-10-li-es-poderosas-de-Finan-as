<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Índice - APP Finanças 10X</title>

<style>
:root {
  --bg: #000;
  --card: rgba(255,255,255,0.08);
  --text: #fff;
  --accent: #e50914;
  --locked: rgba(255,255,255,0.05);
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  font-size: 20px;
  margin: 0;
}

.header a {
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}

/* PROGRESSO */
.progress {
  height: 5px;
  background: #222;
  margin: 0 20px 10px;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: 0.4s;
}

/* LEVEL */
.level {
  padding: 0 20px;
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 10px;
}

/* LISTA */
.list {
  padding: 10px 20px 30px;
}

.card {
  background: var(--card);
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  position: relative;
}

.card:hover {
  transform: scale(1.02);
  background: rgba(255,255,255,0.12);
}

.locked {
  opacity: 0.35;
  cursor: not-allowed;
}

.tag {
  position: absolute;
  right: 10px;
  top: 10px;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 6px;
  background: rgba(0,0,0,0.4);
}

.open { color: #22c55e; }
.lock { color: #e50914; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>📺 Finanças 10X</h1>
  <a href="autor.html">Autor ⚙️</a>
</div>

<!-- LEVEL -->
<div class="level">
  Nível: <b id="level"></b>
</div>

<!-- PROGRESSO -->
<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<!-- LISTA -->
<div class="list" id="list"></div>

<script>

const lessons = [
"Capítulo 01 - Mentalidade Financeira",
"Capítulo 02 - Controle de Gastos",
"Capítulo 03 - Salário não é riqueza",
"Capítulo 04 - Dívidas",
"Capítulo 05 - Poupança",
"Capítulo 06 - Investimentos",
"Capítulo 07 - Ativos vs Passivos",
"Capítulo 08 - Emergência",
"Capítulo 09 - Juros Compostos",
"Capítulo 10 - Liberdade Financeira"
];

function getProgress() {
  return parseInt(localStorage.getItem("finance_progress") || "1");
}

/* NÍVEL DO UTILIZADOR */
function getLevel(p) {
  if (p <= 2) return "Iniciante";
  if (p <= 4) return "Organizador";
  if (p <= 6) return "Investidor";
  if (p <= 8) return "Estratégico";
  return "Liberdade Financeira";
}

let progress = getProgress();

/* LEVEL */
document.getElementById("level").innerText = getLevel(progress);

/* PROGRESS BAR */
document.getElementById("bar").style.width =
  (progress / lessons.length) * 100 + "%";

const list = document.getElementById("list");

/* CAPÍTULOS */
lessons.forEach((title, i) => {
  let num = i + 1;
  let unlocked = num <= progress;

  let card = document.createElement("div");
  card.className = "card " + (unlocked ? "" : "locked");

  card.innerHTML = `
    <div>${title}</div>
    <div class="tag ${unlocked ? 'open' : 'lock'}">
      ${unlocked ? "Desbloqueado" : "Bloqueado"}
    </div>
  `;

  if (unlocked) {
    card.onclick = () => {
      localStorage.setItem("current_chapter", num);
      window.location.href = "cap0" + num + ".html";
    };
  }

  list.appendChild(card);
});

/* 👤 SOBRE O AUTOR (DESBLOQUEIO) */
let authorUnlocked = progress >= 4;

let author = document.createElement("div");
author.className = "card " + (authorUnlocked ? "" : "locked");

author.innerHTML = `
  <div>👤 Sobre o Autor</div>
  <div class="tag ${authorUnlocked ? 'open' : 'lock'}">
    ${authorUnlocked ? "Desbloqueado" : "Bloqueado"}
  </div>
`;

if (authorUnlocked) {
  author.onclick = () => {
    window.location.href = "autor.html";
  };
}

list.appendChild(author);

/* 💼 CONSULTORIA */
let consultUnlocked = progress >= 7;

let consult = document.createElement("div");
consult.className = "card " + (consultUnlocked ? "" : "locked");

consult.innerHTML = `
  <div>💼 Consultoria Financeira</div>
  <div class="tag ${consultUnlocked ? 'open' : 'lock'}">
    ${consultUnlocked ? "Desbloqueado" : "Bloqueado"}
  </div>
`;

if (consultUnlocked) {
  consult.onclick = () => {
    window.location.href = "consultoria.html";
  };
}

list.appendChild(consult);

</script>

</body>
</html>
