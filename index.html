<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APP Finanças</title>

  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --card: rgba(255,255,255,0.08);
      --btn: #e50914;
    }

    body.light {
      --bg: #f5f5f5;
      --text: #111;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* FUNDO CINEMATOGRÁFICO */
    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url("IMG_1810.jpeg") center/cover no-repeat;
      filter: blur(18px) brightness(0.4);
      transform: scale(1.1);
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
    }

    /* SETTINGS */
    .settings {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 22px;
      cursor: pointer;
      z-index: 10;
    }

    /* SPLASH CONTENT */
    .splash {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .logo {
      width: 180px;
      border-radius: 14px;
      box-shadow: 0 10px 50px rgba(0,0,0,0.8);
      animation: zoom 1.5s ease-in-out;
    }

    h1 {
      margin-top: 15px;
      letter-spacing: 2px;
      animation: fade 2s ease-in-out;
    }

    p {
      opacity: 0.7;
      font-size: 13px;
      animation: fade 2.5s ease-in-out;
    }

    /* LOADING BAR */
    .loader {
      margin-top: 20px;
      width: 160px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .loader div {
      width: 0%;
      height: 100%;
      background: #e50914;
      animation: load 3s linear forwards;
    }

    @keyframes load {
      to { width: 100%; }
    }

    @keyframes zoom {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* MODAL SETTINGS */
    .modal {
      position: absolute;
      top: 50px;
      left: 15px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 10px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
      width: 220px;
    }

    .whatsapp {
      background: #25D366;
      color: white;
      padding: 10px;
      border-radius: 6px;
      text-decoration: none;
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- FUNDO -->
  <div class="background"></div>
  <div class="overlay"></div>

  <!-- SETTINGS -->
  <div class="settings" onclick="toggleSettings()">⚙️</div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <button onclick="toggleTheme()">🌗 Tema</button>

    <small>Autor</small>
    <div>APP Finanças Premium</div>

    <a class="whatsapp" href="https://wa.me/244929311220" target="_blank">
      WhatsApp Suporte
    </a>
  </div>

  <!-- SPLASH -->
  <div class="splash">

    <img src="IMG_1810.jpeg" class="logo">

    <h1>AS 10 LIÇÕES MAIS PODEROSAS DA FINANÇAS</h1>
    <p>Carregando experiência financeira...</p>

    <div class="loader">
      <div></div>
    </div>

  </div>

  <script>
    function toggleSettings() {
      const m = document.getElementById("modal");
      m.style.display = (m.style.display === "flex") ? "none" : "flex";
    }

    function toggleTheme() {
      document.body.classList.toggle("light");
    }

    // SPLASH → INDICE
    setTimeout(() => {
      window.location.href = "indice.html";
    }, 3000);
  </script>

</body>
</html>
